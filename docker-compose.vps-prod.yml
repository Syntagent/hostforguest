# VPS production: full stack on localhost-only ports (Cloudflare Tunnel in front).
# Usage:
#   docker compose -p hostforguest-prod -f docker-compose.yml -f docker-compose.vps-prod.yml \
#     --profile docker-api up -d --build

services:
  postgres:
    container_name: hostforguest_prod_postgres
    ports: !override
      - "127.0.0.1:5439:5432"
    environment:
      POSTGRES_HOST_AUTH_METHOD: "${POSTGRES_HOST_AUTH_METHOD:-md5}"

  api:
    container_name: hostforguest_prod_api
    ports: !override
      - "127.0.0.1:8006:8000"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "awk '$$2 ~ /:1F40$/ && $$4 == \"0A\" { found=1 } END { exit found ? 0 : 1 }' /proc/net/tcp /proc/net/tcp6",
        ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 900s
    environment:
      ENVIRONMENT: production
      DEBUG: "false"
      # Use container hostname — shared `tourist_guide_network` has dev+prod both aliased as "postgres".
      POSTGRES_SERVER: hostforguest_prod_postgres
      POSTGRES_PORT: "5432"
      GOOGLE_MAPS_API_KEY: ${GOOGLE_MAPS_API_KEY:-}
      GEMMA4_BASE_URL: ${GEMMA4_BASE_URL:-}
      GEMMA4_MODEL: ${GEMMA4_MODEL:-}
      GEMMA4_CF_CLIENT_ID: ${GEMMA4_CF_CLIENT_ID:-}
      GEMMA4_CF_CLIENT_SECRET: ${GEMMA4_CF_CLIENT_SECRET:-}
      CORS_ORIGINS: "${CORS_ORIGINS:-https://hostforguest.syntagent.com,http://127.0.0.1:3007,http://localhost:3007,http://127.0.0.1:3055,http://localhost:3055}"
      DISABLE_RATE_LIMIT: "${DISABLE_RATE_LIMIT:-1}"

  frontend:
    container_name: hostforguest_prod_frontend
    ports: !override
      - "127.0.0.1:3007:3000"
    build:
      args:
        NEXT_PUBLIC_API_URL: "${NEXT_PUBLIC_API_URL:-https://hostforguest.syntagent.com}"

  channel_sync:
    container_name: hostforguest_prod_channel_sync
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import os,time; p=os.environ.get('CHANNEL_SYNC_HEARTBEAT_PATH','/tmp/channel_sync_heartbeat'); raise SystemExit(0 if os.path.isfile(p) and time.time()-os.path.getmtime(p)<900 else 1)",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 120s
    environment:
      ENVIRONMENT: production
      DEBUG: "false"
      POSTGRES_SERVER: hostforguest_prod_postgres
      POSTGRES_PORT: "5432"
      CHANNEL_SYNC_HEARTBEAT_PATH: "/tmp/channel_sync_heartbeat"

  event_sync:
    container_name: hostforguest_prod_event_sync
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import os,time; p=os.environ.get('EVENT_SYNC_HEARTBEAT_PATH','/tmp/event_sync_heartbeat'); raise SystemExit(0 if os.path.isfile(p) and time.time()-os.path.getmtime(p)<90000 else 1)",
        ]
      interval: 60s
      timeout: 5s
      retries: 3
      start_period: 120s
    environment:
      ENVIRONMENT: production
      DEBUG: "false"
      POSTGRES_SERVER: hostforguest_prod_postgres
      POSTGRES_PORT: "5432"
      EVENT_SYNC_INTERVAL_SEC: "${EVENT_SYNC_INTERVAL_SEC:-86400}"
      EVENT_COORD_BACKFILL_INTERVAL_SEC: "${EVENT_COORD_BACKFILL_INTERVAL_SEC:-604800}"
      EVENT_SYNC_HEARTBEAT_PATH: "/tmp/event_sync_heartbeat"
      GOOGLE_MAPS_API_KEY: ${GOOGLE_MAPS_API_KEY:-}
      GEMMA4_BASE_URL: ${GEMMA4_BASE_URL:-}
      GEMMA4_MODEL: ${GEMMA4_MODEL:-}
      GEMMA4_CF_CLIENT_ID: ${GEMMA4_CF_CLIENT_ID:-}
      GEMMA4_CF_CLIENT_SECRET: ${GEMMA4_CF_CLIENT_SECRET:-}
      GOOGLE_AI_API_KEY: ${GOOGLE_AI_API_KEY:-}
