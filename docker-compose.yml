# Databases start by default. Containerized API + Next do NOT — use local `npm run dev` instead.
#
# Typical coding workflow:
#   docker compose up -d              → Postgres + Neo4j only (ports 5434, 7688)
#   npm run dev                       → FastAPI + Next on host (8000 + 3055)
#
# Full stack in Docker (CI / parity only):
#   docker compose --profile docker-api up -d --build
#
# Old one-liner `docker compose up` used to bind :8000 and shadow local uvicorn — that is fixed.
services:
  api:
    profiles:
      - docker-api
    build: .
    # Named uniquely to avoid Docker Desktop ghost conflicts on "tourist_guide_api"
    container_name: tourist_guide_app_api
    ports:
      - "8000:8000"
    environment:
      # Local stack: development + seed force so "Dev Login" works (dev@touristguide.local).
      ENVIRONMENT: "${ENVIRONMENT:-development}"
      DEBUG: "${DEBUG:-true}"
      DEV_LOGIN_SEED_FORCE: "${DEV_LOGIN_SEED_FORCE:-false}"
      USE_POSTGRESQL: "true"
      POSTGRES_SERVER: postgres
      POSTGRES_USER: tourist_guide_user
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:-}"
      POSTGRES_DB: tourist_guide_db
      POSTGRES_PORT: "5432"
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: "${NEO4J_PASSWORD:-tourist_guide_neo4j}"
      BOOKING_COM_MOCK: "${BOOKING_COM_MOCK:-true}"
      SECRET_KEY: "${SECRET_KEY:-your-super-secret-key-here-change-in-production}"
      CORS_ORIGINS: "${CORS_ORIGINS:-http://localhost:3001,http://127.0.0.1:3001}"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=3).read()"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    restart: unless-stopped

  # Next.js UI — only when profile docker-api is enabled.
  frontend:
    profiles:
      - docker-api
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000}
        NEXT_PUBLIC_GOOGLE_MAPS_API_KEY: ${NEXT_PUBLIC_GOOGLE_MAPS_API_KEY:-${GOOGLE_MAPS_API_KEY:-}}
        NEXT_PUBLIC_CONTACT_EMAIL: ${NEXT_PUBLIC_CONTACT_EMAIL:-}
        NEXT_PUBLIC_CONTACT_PHONE: ${NEXT_PUBLIC_CONTACT_PHONE:-}
    container_name: tourist_guide_frontend
    # Default 3001 so host `next dev` on 3000 can run in parallel; set FRONTEND_PUBLISH_PORT=3000 to use 3000.
    ports:
      - "${FRONTEND_PUBLISH_PORT:-3001}:3000"
    environment:
      NODE_ENV: production
      PORT: "3000"
      HOSTNAME: "0.0.0.0"
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3000/').then((r)=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    restart: unless-stopped

  channel_sync:
    build: .
    container_name: tourist_guide_channel_sync
    command: ["python", "-m", "app.tasks.channel_sync_runner"]
    environment:
      ENVIRONMENT: "${ENVIRONMENT:-development}"
      DEBUG: "${DEBUG:-true}"
      USE_POSTGRESQL: "true"
      POSTGRES_SERVER: postgres
      POSTGRES_USER: tourist_guide_user
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:-}"
      POSTGRES_DB: tourist_guide_db
      POSTGRES_PORT: "5432"
      CHANNEL_SYNC_INTERVAL_SEC: "${CHANNEL_SYNC_INTERVAL_SEC:-300}"
      BOOKING_COM_MOCK: "${BOOKING_COM_MOCK:-true}"
      SECRET_KEY: "${SECRET_KEY:-your-super-secret-key-here-change-in-production}"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    profiles:
      - full

  postgres:
    image: postgis/postgis:16-3.4
    container_name: tourist_guide_postgres
    environment:
      POSTGRES_DB: tourist_guide_db
      POSTGRES_USER: tourist_guide_user
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:-}"
      POSTGRES_HOST_AUTH_METHOD: "${POSTGRES_HOST_AUTH_METHOD:-trust}"
    ports:
      - "5434:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tourist_guide_user -d tourist_guide_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  neo4j:
    image: neo4j:5.15-community
    container_name: tourist_guide_neo4j
    environment:
      NEO4J_AUTH: "neo4j/${NEO4J_PASSWORD:-tourist_guide_neo4j}"
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_apoc_export_file_enabled: true
      NEO4J_apoc_import_file_enabled: true
      NEO4J_apoc_import_file_use__neo4j__config: true
      NEO4J_ACCEPT_LICENSE_AGREEMENT: yes
    ports:
      - "7475:7474"
      - "7688:7687"
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
      - neo4j_import:/var/lib/neo4j/import
      - neo4j_plugins:/plugins
    healthcheck:
      test: ["CMD", "cypher-shell", "-u", "neo4j", "-p", "${NEO4J_PASSWORD:-tourist_guide_neo4j}", "RETURN 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 40s
    restart: unless-stopped

volumes:
  postgres_data:
    driver: local
  neo4j_data:
    driver: local
  neo4j_logs:
    driver: local
  neo4j_import:
    driver: local
  neo4j_plugins:
    driver: local

networks:
  default:
    name: tourist_guide_network
