# CI: backend tests against compose Postgres + frontend production build.

name: CI

on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    runs-on: ubuntu-latest
    env:
      ENVIRONMENT: development
      # Matches local compose / .env expectations for smoke tests
      DISABLE_RATE_LIMIT: "1"
      SKIP_SENTENCE_TRANSFORMERS: "1"
      TOURISTGUIDE_PYTEST: "1"
      RUN_POSTGRES_TESTS: "1"
      USE_POSTGRESQL: "true"
      POSTGRES_SERVER: localhost
      POSTGRES_PORT: "5434"
      POSTGRES_USER: tourist_guide_user
      POSTGRES_DB: tourist_guide_db
      POSTGRES_PASSWORD: ci_smoke_password
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: tourist_guide_user
          POSTGRES_PASSWORD: ci_smoke_password
          POSTGRES_DB: tourist_guide_db
        ports:
          - 5434:5432
        options: >-
          --health-cmd "pg_isready -U tourist_guide_user -d tourist_guide_db"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Compile Python
        run: python -m compileall -q app

      - name: Pytest (CI smoke)
        run: |
          python -m pytest $(grep -v '^#' scripts/ci-smoke-backend.txt | grep -v '^$' | tr '\n' ' ') -q --tb=short

  frontend:
    runs-on: ubuntu-latest
    env:
      NEXT_PUBLIC_API_URL: http://127.0.0.1:8000
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install and build
        run: |
          npm ci --prefix frontend
          npm run build --prefix frontend

  e2e-guest-events:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    env:
      ENVIRONMENT: development
      DEBUG: "true"
      DISABLE_RATE_LIMIT: "1"
      SKIP_SENTENCE_TRANSFORMERS: "1"
      USE_POSTGRESQL: "true"
      POSTGRES_SERVER: localhost
      POSTGRES_PORT: "5434"
      POSTGRES_USER: tourist_guide_user
      POSTGRES_DB: tourist_guide_db
      DEV_LOGIN_SEED_ENABLED: "true"
      DEV_LOGIN_SEED_FORCE: "true"
      NEXT_PUBLIC_API_URL: http://127.0.0.1:8000
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Install root npm deps (Playwright)
        run: npm ci

      - name: Guest events E2E smoke
        run: bash scripts/run-e2e-ci.sh
