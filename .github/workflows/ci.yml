# Default CI: backend tests (SQLite fixtures) + frontend production build.
# Postgres is optional for local dev; most tests use in-memory SQLite (see tests/conftest.py).

name: CI

on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    runs-on: ubuntu-latest
    env:
      ENVIRONMENT: development
      DISABLE_RATE_LIMIT: "1"
      # VectorService uses a deterministic stub under pytest; this avoids any stray ST load in workers.
      SKIP_SENTENCE_TRANSFORMERS: "1"
      # Skip app lifespan Postgres bootstrap; tests use SQLite via get_db overrides.
      TOURISTGUIDE_PYTEST: "1"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Compile Python
        run: python -m compileall -q app

      - name: Pytest (CI smoke)
        run: |
          # Same modules as `npm run test:ci-smoke` (scripts/ci-smoke-backend.txt).
          python -m pytest $(grep -v '^#' scripts/ci-smoke-backend.txt | grep -v '^$' | tr '\n' ' ') -q --tb=short

  frontend:
    runs-on: ubuntu-latest
    env:
      NEXT_PUBLIC_API_URL: http://127.0.0.1:8000
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install and build
        run: |
          npm ci --prefix frontend
          npm run build --prefix frontend
